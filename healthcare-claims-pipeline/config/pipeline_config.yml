    - OtherPhysician
    - AdmissionDt
    - ClmAdmitDiagnosisCode
    - DeductibleAmtPaid
    - DischargeDt
    - DiagnosisGroupCode
    - ClmDiagnosisCode_1
    - ClmDiagnosisCode_2
    - ClmDiagnosisCode_3
    - ClmDiagnosisCode_4
    - ClmDiagnosisCode_5
    - ClmDiagnosisCode_6
    - ClmDiagnosisCode_7
    - ClmDiagnosisCode_8
    - ClmDiagnosisCode_9
    - ClmDiagnosisCode_10
    - ClmProcedureCode_1
    - ClmProcedureCode_2
